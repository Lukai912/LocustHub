services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: locusthub
      MYSQL_USER: locusthub
      MYSQL_PASSWORD: locusthub
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ulocusthub", "-plocusthub"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_BACKEND: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: locusthub
      MYSQL_PASSWORD: locusthub
      MYSQL_DATABASE: locusthub
      ARTIFACT_STORAGE_PROVIDER: local
      ARTIFACT_ROOT: /app/artifacts
      DEMO_TOKEN: dev-token
    ports:
      - "8000:8000"
    volumes:
      - api-artifacts:/app/artifacts
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  api-artifacts:
