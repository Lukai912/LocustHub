<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocustHub Admin</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1d2530;
      }
      body {
        margin: 0;
      }
      header {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: #ffffff;
        border-bottom: 1px solid #dfe3e8;
      }
      main {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: calc(100vh - 56px);
      }
      nav {
        background: #202936;
        color: #d8dee8;
        padding: 18px 12px;
      }
      nav div {
        padding: 10px 12px;
        border-radius: 6px;
      }
      nav .active {
        background: #344256;
        color: #ffffff;
      }
      section {
        padding: 24px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
      }
      button {
        border: 1px solid #b8c2cc;
        background: #ffffff;
        color: #1d2530;
        height: 34px;
        border-radius: 6px;
        padding: 0 12px;
        cursor: pointer;
      }
      button.primary {
        background: #1668dc;
        border-color: #1668dc;
        color: #ffffff;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #dfe3e8;
        border-radius: 8px;
        padding: 14px;
      }
      .metric {
        font-size: 24px;
        font-weight: 700;
        margin-top: 6px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border: 1px solid #dfe3e8;
      }
      th, td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #edf0f3;
        font-size: 13px;
      }
      th {
        background: #f2f4f7;
        color: #52606d;
      }
      .tabs {
        display: flex;
        gap: 4px;
        margin: 12px 0;
      }
      .tab {
        padding: 8px 12px;
        background: #ffffff;
        border: 1px solid #dfe3e8;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>LocustHub</strong>
      <span>本地 MVP 调试后台</span>
    </header>
    <main>
      <nav>
        <div>仪表盘</div>
        <div>租户管理</div>
        <div>项目管理</div>
        <div>压测计划</div>
        <div class="active">任务详情</div>
        <div>报告中心</div>
      </nav>
      <section>
        <div class="toolbar">
          <button class="primary" id="create">创建并启动 Demo 任务</button>
          <button id="collect">采集一次</button>
          <button id="stop">停止并归档</button>
          <span id="status">未启动</span>
        </div>
        <div class="cards">
          <div class="card">Users<div class="metric" id="users">0</div></div>
          <div class="card">RPS<div class="metric" id="rps">0</div></div>
          <div class="card">Failures/s<div class="metric" id="failures">0</div></div>
          <div class="card">P95<div class="metric" id="p95">0</div></div>
        </div>
        <div class="tabs">
          <div class="tab">Statistics</div>
          <div class="tab">Charts</div>
          <div class="tab">Failures</div>
          <div class="tab">Exceptions</div>
          <div class="tab">Workers</div>
          <div class="tab">Logs</div>
          <div class="tab">Download</div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Name</th>
              <th>Requests</th>
              <th>Fails</th>
              <th>Median</th>
              <th>Average</th>
              <th>Min</th>
              <th>Max</th>
              <th>Current RPS</th>
              <th>95%</th>
              <th>99%</th>
            </tr>
          </thead>
          <tbody id="stats"></tbody>
        </table>
      </section>
    </main>
    <script>
      const api = "http://127.0.0.1:8000/api/v1";
      const headers = { "Content-Type": "application/json", Authorization: "Bearer dev-token" };
      let runId = null;

      async function request(path, options = {}) {
        const response = await fetch(`${api}${path}`, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      async function createAndStart() {
        const plans = await request("/test-plans");
        const plan = plans[0];
        const run = await request("/test-runs", {
          method: "POST",
          body: JSON.stringify({
            tenant_id: plan.tenant_id,
            project_id: plan.project_id,
            test_plan_id: plan.id,
            source: "manual",
          }),
        });
        runId = run.id;
        const started = await request(`/test-runs/${runId}/start`, { method: "POST" });
        document.getElementById("status").textContent = `${started.status} ${runId}`;
        await refresh();
      }

      async function collect() {
        if (!runId) return;
        await request(`/test-runs/${runId}/collect`, { method: "POST" });
        await refresh();
      }

      async function stopRun() {
        if (!runId) return;
        const stopped = await request(`/test-runs/${runId}/stop`, { method: "POST" });
        document.getElementById("status").textContent = stopped.status;
        await refresh();
      }

      async function refresh() {
        if (!runId) return;
        const data = await request(`/test-runs/${runId}/locust/stats`);
        document.getElementById("users").textContent = data.user_count;
        document.getElementById("rps").textContent = data.total_rps;
        document.getElementById("failures").textContent = data.total_fail_per_sec;
        document.getElementById("p95").textContent = data.current_response_time_percentiles["response_time_percentile_0.95"];
        document.getElementById("stats").innerHTML = data.stats.map(row => `
          <tr>
            <td>${row.method}</td>
            <td>${row.name}</td>
            <td>${row.num_requests}</td>
            <td>${row.num_failures}</td>
            <td>${row.median_response_time}</td>
            <td>${row.avg_response_time}</td>
            <td>${row.min_response_time}</td>
            <td>${row.max_response_time}</td>
            <td>${row.current_rps}</td>
            <td>${row["response_time_percentile_0.95"]}</td>
            <td>${row["response_time_percentile_0.99"]}</td>
          </tr>`).join("");
      }

      document.getElementById("create").addEventListener("click", createAndStart);
      document.getElementById("collect").addEventListener("click", collect);
      document.getElementById("stop").addEventListener("click", stopRun);
    </script>
  </body>
</html>
