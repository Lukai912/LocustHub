api:
  image:
    repository: locusthub-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1

admin:
  image:
    repository: locusthub-admin
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1

service:
  type: ClusterIP
  port: 8000

adminService:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: locusthub.example.com
  annotations: {}
  tls:
    enabled: true
    secretName: locusthub-tls

secret:
  create: true
  name: ""
  existingSecret: ""
  stringData:
    MYSQL_PASSWORD: locusthub
    ALIYUN_OSS_ACCESS_KEY_ID: ""
    ALIYUN_OSS_ACCESS_KEY_SECRET: ""
    DEMO_TOKEN: dev-token

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

env:
  DATABASE_BACKEND: mysql
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_USER: locusthub
  MYSQL_DATABASE: locusthub
  ARTIFACT_STORAGE_PROVIDER: aliyun_oss
  LANE_RUNTIME_BACKEND: kubernetes
  LANE_NAMESPACE_STRATEGY: tenant
  KUBERNETES_APPLY_ENABLED: "true"
  LOCUST_IMAGE: locustio/locust:latest
  LOCUST_METRICS_BACKEND: locust_api
  LOCUST_MASTER_BASE_URL_TEMPLATE: http://{run_id}-master.{namespace}.svc.cluster.local:8089
  ALIYUN_OSS_ENDPOINT: ""
  ALIYUN_OSS_BUCKET: ""
  ALIYUN_OSS_SIGNED_URL_EXPIRE_SECONDS: "900"
  PUBLIC_API_BASE_URL: https://locusthub.example.com/api/v1
  PUBLIC_ADMIN_BASE_URL: https://locusthub.example.com
