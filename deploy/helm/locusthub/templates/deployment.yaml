apiVersion: apps/v1
kind: Deployment
metadata:
  name: locusthub-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: locusthub-api
  template:
    metadata:
      labels:
        app: locusthub-api
    spec:
      serviceAccountName: {{ default (printf "%s-api" .Release.Name) .Values.serviceAccount.name }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (default (printf "%s-secrets" .Release.Name) .Values.secret.name) .Values.secret.existingSecret }}
                  key: MYSQL_PASSWORD
            - name: ALIYUN_OSS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ default (default (printf "%s-secrets" .Release.Name) .Values.secret.name) .Values.secret.existingSecret }}
                  key: ALIYUN_OSS_ACCESS_KEY_ID
            - name: ALIYUN_OSS_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (default (printf "%s-secrets" .Release.Name) .Values.secret.name) .Values.secret.existingSecret }}
                  key: ALIYUN_OSS_ACCESS_KEY_SECRET
            - name: DEMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (default (printf "%s-secrets" .Release.Name) .Values.secret.name) .Values.secret.existingSecret }}
                  key: DEMO_TOKEN
