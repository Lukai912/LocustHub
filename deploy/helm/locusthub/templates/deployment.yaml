apiVersion: apps/v1
kind: Deployment
metadata:
  name: locusthub-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locusthub-api
  template:
    metadata:
      labels:
        app: locusthub-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
